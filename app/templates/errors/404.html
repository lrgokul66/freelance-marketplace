{% extends "base.html" %}
{% block title %}404 — Not Found{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center text-center">
    <div class="fade-in-up">
        <div style="font-size:7rem;line-height:1;" class="mb-3">🔍</div>
        <h1 class="display-4 fw-800">404</h1>
        <h3 class="fw-600 mb-3">Page Not Found</h3>
        <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('main.home') }}" class="btn btn-primary px-4">
            <i class="bi bi-house me-2"></i>Go Home
        </a>
    </div>
</div>
{% endblock %}
