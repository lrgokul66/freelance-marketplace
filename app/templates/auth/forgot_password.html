{% extends "base.html" %}
{% block title %}Forgot Password — FreelanceHub{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5"
    style="background: linear-gradient(135deg,#6366f1,#8b5cf6,#10b981);">
    <div class="container" style="max-width:440px;">
        <div class="card p-4 fade-in-up">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill fs-1 text-primary"></i>
                <h2 class="fw-800 mt-2 mb-0">Reset Password</h2>
                <p class="text-muted small">Enter your email — we'll send a reset link.</p>
            </div>
            <form method="POST" data-loading>
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required placeholder="you@example.com"
                        autofocus>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
                    <i class="bi bi-send me-2"></i>Send Reset Link
                </button>
            </form>
            <p class="text-center text-muted small mt-3 mb-0">
                <a href="{{ url_for('auth.login') }}"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
