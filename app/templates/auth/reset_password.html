{% extends "base.html" %}
{% block title %}Set New Password — FreelanceHub{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5"
    style="background: linear-gradient(135deg,#6366f1,#8b5cf6,#10b981);">
    <div class="container" style="max-width:440px;">
        <div class="card p-4 fade-in-up">
            <div class="text-center mb-4">
                <i class="bi bi-key-fill fs-1 text-primary"></i>
                <h2 class="fw-800 mt-2 mb-0">New Password</h2>
                <p class="text-muted small">Choose a strong password (min 8 characters).</p>
            </div>
            <form method="POST" data-loading>
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="newPwd" class="form-control" placeholder="••••••••"
                            required minlength="8">
                        <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('newPwd',this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
                    <i class="bi bi-check-circle me-2"></i>Update Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    function togglePwd(id, btn) { const i = document.getElementById(id); const t = i.type === 'text'; i.type = t ? 'password' : 'text'; btn.innerHTML = t ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>'; }
</script>
{% endblock %}
