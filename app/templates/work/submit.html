{% extends "base.html" %}
{% block title %}Submit Work — {{ project.title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4 fade-in-up">
            <div class="text-center mb-4">
                <i class="bi bi-upload fs-1 text-primary"></i>
                <h2 class="fw-800 mt-2 mb-0">Submit Your Work</h2>
                <p class="text-muted small">For: <strong>{{ project.title }}</strong></p>
            </div>
            <form method="POST" enctype="multipart/form-data" data-loading>
                <div class="mb-3">
                    <label class="form-label">Work File <span class="text-danger">*</span></label>
                    <div class="drop-zone" onclick="document.getElementById('workFileInput').click()">
                        <i class="bi bi-cloud-arrow-up fs-2 d-block mb-1"></i>
                        <span>Click to upload or drag & drop</span>
                        <div class="small text-muted mt-1">ZIP, PDF, images, docs — max 50MB</div>
                        <input type="file" name="work_file" id="workFileInput" class="d-none" required>
                    </div>
                    <div id="workFileName"
                        class="text-muted small mt-2 d-flex justify-content-between align-items-center">
                        <span id="workFileNameLabel"></span>
                        <button type="button" class="btn btn-sm btn-outline-danger d-none" id="removeWorkFileBtn"
                            style="padding: 2px 6px; font-size: 0.75rem;">
                            <i class="bi bi-x-circle me-1"></i>Deselect
                        </button>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Notes for Client <span class="text-muted small">(optional)</span></label>
                    <textarea name="notes" class="form-control" rows="4"
                        placeholder="Describe what you've delivered, any instructions, notes…"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
                    <i class="bi bi-send me-2"></i>Submit for Review
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    const fileInput = document.getElementById('workFileInput');
    const nameLabel = document.getElementById('workFileNameLabel');
    const removeBtn = document.getElementById('removeWorkFileBtn');

    function updateFileDisplay() {
        if (fileInput.files && fileInput.files[0]) {
            nameLabel.textContent = '📎 ' + fileInput.files[0].name;
            removeBtn.classList.remove('d-none');
        } else {
            nameLabel.textContent = '';
            removeBtn.classList.add('d-none');
        }
    }

    fileInput.addEventListener('change', updateFileDisplay);

    removeBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        fileInput.value = "";
        updateFileDisplay();
    });

    // Drag & drop
    const dz = document.querySelector('.drop-zone');
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('active'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('active'));
    dz.addEventListener('drop', e => {
        e.preventDefault();
        dz.classList.remove('active');
        fileInput.files = e.dataTransfer.files;
        updateFileDisplay();
    });
</script>
{% endblock %}
