{% extends "base.html" %}
{% block title %}Leave a Review — FreelanceHub{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 fade-in-up">
            <div class="text-center mb-4">
                <i class="bi bi-star-fill fs-1 text-warning"></i>
                <h2 class="fw-800 mt-2 mb-0">Leave a Review</h2>
                <p class="text-muted small">For project: <strong>{{ project.title }}</strong></p>
            </div>
            <form method="POST" data-loading>
                <div class="mb-4 text-center">
                    <label class="form-label d-block">Rating <span class="text-danger">*</span></label>
                    <div class="star-rating-input stars-input d-flex justify-content-center gap-2 fs-2">
                        {% for i in [5,4,3,2,1] %}
                        <label style="cursor:pointer;color:#e2e8f0;" for="star{{ i }}">
                            <i class="bi bi-star-fill"></i>
                            <input type="radio" name="rating" id="star{{ i }}" value="{{ i }}" class="d-none"
                                {{ 'checked' if i==5 }}>
                        </label>
                        {% endfor %}
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Your Comments <span class="text-muted small">(optional)</span></label>
                    <textarea name="comment" class="form-control" rows="4"
                        placeholder="Share your experience…"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
                    <i class="bi bi-star me-2"></i>Submit Review
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
